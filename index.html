<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo Eldorado</title>
  <link rel="icon" href="Logos/Favicon.png" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>
  <header>
    <img id="logo" src="Logos/Eldorado.png" alt="Logo" />
    <button id="menuBtn">☰</button>
    <nav id="menu">
      <button data-catalogo="eldorado">Catálogo Eldorado</button>
      <button data-catalogo="ternura">Produtos Ternura</button>
    </nav>
    <h1 id="titulo">Catálogo Eldorado</h1>
    <p id="subtitulo">Consulte produtos por código, descrição, EAN, fornecedor ou código do fornecedor.</p>
  </header>

  <main>
    <section class="filtros">
      <input id="busca" placeholder="Código, EAN ou descrição" />
      <input id="codFornecedor" placeholder="Cód. fornecedor" />
      <div class="fornecedorBox">
        <input id="fornecedor" placeholder="Fornecedor" autocomplete="off" />
        <div id="sugestoes"></div>
      </div>

      <select id="estoqueFiltro">
        <option value="com">Apenas produtos com estoque</option>
        <option value="sem">Apenas produtos sem estoque</option>
        <option value="todos">Todos os produtos</option>
      </select>

      <select id="ordenacao">
        <option value="codigoAsc">Código crescente</option>
        <option value="codigoDesc">Código decrescente</option>
        <option value="descAsc">Descrição A-Z</option>
        <option value="descDesc">Descrição Z-A</option>
        <option value="estoqueDesc">Maior estoque</option>
      </select>

      <button id="limpar">Limpar filtros</button>
    </section>

    <section id="mensagem"></section>
    <section id="produtos"></section>

    <section class="paginacao">
      <button id="anterior">Anterior</button>
      <span id="paginaInfo"></span>
      <button id="proxima">Próxima</button>
    </section>
  </main>

  <button id="cotacaoFloat">🛒 <span id="cotacaoQtd">0</span></button>

  <aside id="cotacaoPainel">
    <div class="cotacaoTopo">
      <h2>Cotação</h2>
      <button id="fecharCotacao">×</button>
    </div>
    <div id="cotacaoLista"></div>
  </aside>

  <div id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
